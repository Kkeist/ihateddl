<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#f5ede0">
  <title>iHateDDL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/app.css">
</head>
<body data-theme="light" data-lang="zh">

<div id="app">
  <header id="app-header">
    <button id="btn-back" class="hdr-btn hidden" onclick="App.goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h1 id="header-title">iHateDDL</h1>
    <div id="header-actions"></div>
  </header>

  <main id="main-content">
    <div id="view-calendar" class="view"></div>
    <div id="view-folders"  class="view hidden"></div>
    <div id="view-courses"  class="view hidden"></div>
    <div id="view-editor"   class="view hidden"></div>
    <div id="view-tools"    class="view hidden"></div>
    <div id="view-settings" class="view hidden"></div>
  </main>

  <nav id="nav-bar"><div class="nav-inner">
    <button class="nav-tab active" data-view="calendar">
      <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span data-i18n="nav.calendar">日历</span>
    </button>
    <button class="nav-tab" data-view="folders">
      <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M4 20h16a2 2 0 002-2V8a2 2 0 00-2-2h-7.93a2 2 0 01-1.66-.9l-.82-1.2A2 2 0 007.93 3H4a2 2 0 00-2 2v13a2 2 0 002 2z"/></svg>
      <span data-i18n="nav.courses">课程</span>
    </button>
    <button class="nav-tab" data-view="tools">
      <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span data-i18n="nav.tools">工具箱</span>
    </button>
    <button class="nav-tab" data-view="settings">
      <svg class="nav-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span data-i18n="nav.settings">设置</span>
    </button>
  </div></nav>
</div>

<div id="modal-overlay" class="hidden" onclick="Modal.closeOnOverlay(event)">
  <div id="modal-box">
    <div id="modal-header"><h3 id="modal-title"></h3><button class="hdr-btn" onclick="Modal.close()">✕</button></div>
    <div id="modal-body"></div>
    <div id="modal-footer"></div>
  </div>
</div>
<div id="toast-container"></div>
<div id="lang-overlay" class="hidden">
  <div id="lang-box">
    <h2>iHateDDL</h2>
    <p>选择语言 / Choose your language</p>
    <div class="lang-opts" id="lang-options"></div>
  </div>
</div>
<div id="onboarding-overlay" class="hidden">
  <div id="onboarding-highlight"></div>
  <div id="onboarding-tooltip">
    <p id="onboarding-text"></p>
    <div id="onboarding-actions">
      <span id="onboarding-skip" onclick="Onboarding.skip()"></span>
      <button id="onboarding-next" onclick="Onboarding.next()"></button>
    </div>
  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/utils.js"></script>
<script src="js/store.js"></script>
<script src="js/views/folders.js"></script>
<script src="js/views/courses.js"></script>
<script src="js/views/editor.js"></script>
<script src="js/views/calendar.js"></script>
<script src="js/views/tools.js"></script>
<script src="js/views/settings.js"></script>
<script src="js/onboarding.js"></script>
<script src="js/app.js"></script>
</body>
</html>
